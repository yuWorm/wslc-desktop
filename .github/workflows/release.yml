name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            rid: win-x64
          - platform: ARM64
            rid: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Derive release version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)(?:[-+].*)?$') {
            throw "Release tags must use vMAJOR.MINOR.PATCH format. Received: $tag"
          }

          $releaseVersion = $Matches.version
          "release_version=$releaseVersion" >> $env:GITHUB_OUTPUT

      - name: Restore and verify release layout
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\Verify-FullRelease.ps1 -Platform "${{ matrix.platform }}" -SkipPackage -AllowKnownLocalBlockers

      - name: Build release artifacts
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\Build-ReleaseArtifacts.ps1 -Platform "${{ matrix.platform }}" -Version "${{ steps.version.outputs.release_version }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wslc-desktop-${{ steps.version.outputs.release_version }}-${{ matrix.rid }}
          path: |
            artifacts/release/*.exe
            artifacts/release/*.zip
            artifacts/release/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/release
          pattern: wslc-desktop-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WSLC Desktop ${{ github.ref_name }}
          body_path: docs/RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/release/*.exe
            artifacts/release/*.zip
            artifacts/release/*.sha256
          fail_on_unmatched_files: true
